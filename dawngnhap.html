<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        (function() {
            const t = localStorage.getItem('hmusic-theme') || 'dark';
            document.documentElement.classList.add(t === 'light' ? 'light-mode' : 'dark-mode');
            const c = localStorage.getItem('hmusic-color-theme') || 'violet';
            document.documentElement.setAttribute('data-theme', c);
        })();
    </script>
    <title>Đăng Nhập - H-MUSIC</title>
    <script src="auth.js"></script>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/dawngnhap.css">
    <link rel="stylesheet" href="css/toast.css">
</head>
<body>
    <div class="login-container">
        <form class="login-form" id="loginForm">
                       <img src="./logo.png" alt="H-MUSIC Logo" class="auth-logo">
            <h2>Chào mừng bạn quay lại với</h2>
            <h1>H-MUSIC</h1>
            <p>Vui lòng đăng nhập vào tài khoản để có trải nghiệm tốt nhất</p>
            
            <div class="input-group">
                <input type="text" id="loginAcc" placeholder="Tên đăng nhập" required>
            </div>
            
            <div class="input-group">
                <input type="password" id="loginPass" placeholder="Mật khẩu" required>
            </div>
            
            <button type="submit" class="login-btn">Đăng Nhập</button>
            
            <div class="options">
                <a href="#">Quên mật khẩu?</a>
                <span>Chưa có tài khoản? <a href="dangki.html">Đăng ký ngay</a></span>
            </div>
        </form>
        
        
    </div>
    
    <div style="position:fixed; top:20px; right:20px; z-index:9999;">
        <label class="theme-switch" for="themeCheckbox">
            <input type="checkbox" id="themeCheckbox" />
            <div class="slider round">
                <span class="sun-icon">☀️</span><span class="moon-icon">🌙</span>
            </div>
        </label>
    </div>

    
    <script src="js/api.js"></script>
    <script src="js/dawngnhap.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/theme.js"></script>
</body>
</html>
